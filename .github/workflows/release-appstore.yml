# MachStruct — Mac App Store Release Pipeline
#
# Builds an App Store-signed .pkg with Sparkle excluded (APP_STORE_BUILD=YES),
# validates it with altool, and uploads it as a workflow artifact for manual
# upload via Transporter (or `xcrun altool --upload-app`).
#
# Triggers:
#   - Tags matching "v*-appstore" (e.g. v1.1.0-appstore) — preferred for ship.
#   - workflow_dispatch — manual runs for dry-runs and validation checks.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_DISTRIBUTION_CERTIFICATE          Base64-encoded "Apple Distribution" .p12
#   APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD Password for that .p12
#   APPLE_TEAM_ID                           10-character Apple Developer Team ID
#   APPLE_ID                                Apple ID for altool (Apple Developer)
#   NOTARIZATION_PASSWORD                   App-specific password (also used by altool validate)
#   KEYCHAIN_PASSWORD                       Random string for the temporary build keychain
#   APPSTORE_PROVISIONING_PROFILES_BASE64   tar+gzip of the three .provisionprofile files,
#                                           base64-encoded (one tarball, all profiles inside)

name: Release (App Store)

on:
  push:
    tags:
      - "v*-appstore"
  workflow_dispatch:
    inputs:
      validate_only:
        description: "Validate the .pkg with altool but skip uploading the artifact"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  appstore:
    name: Build, Sign, Validate (App Store)
    runs-on: macos-15

    env:
      SCHEME:        MachStruct
      CONFIGURATION: Release
      ARCHIVE_PATH:  ${{ github.workspace }}/build/MachStruct-AppStore.xcarchive
      EXPORT_PATH:   ${{ github.workspace }}/build/export-appstore
      PKG_PATH:      ${{ github.workspace }}/build/export-appstore/MachStruct.pkg

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── 2. Select Xcode and accept licence ─────────────────────────────────
      - name: Select Xcode
        run: |
          xcodebuild -version
          swift --version

      - name: Accept Xcode license
        run: sudo xcodebuild -license accept

      # ── 3. Import Apple Distribution certificate ───────────────────────────
      - name: Import certificate into keychain
        env:
          CERTIFICATE_BASE64:   ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:    ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/apple_distribution.p12

          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── 4. Install provisioning profiles ───────────────────────────────────
      - name: Install Mac App Store provisioning profiles
        env:
          PROFILES_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILES_BASE64 }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          TARBALL=$RUNNER_TEMP/profiles.tar.gz
          echo "$PROFILES_BASE64" | base64 --decode -o "$TARBALL"

          # Profiles inside the tarball are expected at the top level.
          tar -xzvf "$TARBALL" -C "$PROFILES_DIR"

          ls -la "$PROFILES_DIR"

      # ── 5. Patch ExportOptions-AppStore.plist with Team ID ────────────────
      - name: Patch ExportOptions-AppStore.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          /usr/libexec/PlistBuddy \
            -c "Set :teamID $APPLE_TEAM_ID" \
            ExportOptions-AppStore.plist

      # ── 6. Archive with Sparkle excluded ───────────────────────────────────
      # APP_STORE_BUILD=YES is the gate around `import Sparkle` and the
      # auto-update plumbing (see commit 71c91bb).
      - name: Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project MachStruct.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=macOS" \
            -skipPackagePluginValidation \
            -archivePath "$ARCHIVE_PATH" \
            APP_STORE_BUILD=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}"

      # ── 7. Export as .pkg for App Store Connect ────────────────────────────
      - name: Export archive (App Store)
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions-AppStore.plist

      - name: Verify .pkg
        run: |
          test -f "$PKG_PATH" || { echo "::error::No .pkg produced at $PKG_PATH"; exit 1; }
          ls -la "$EXPORT_PATH"
          pkgutil --check-signature "$PKG_PATH" || true

      # ── 8. Validate with altool (no upload) ────────────────────────────────
      - name: Validate with altool
        env:
          APPLE_ID:              ${{ secrets.APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun altool --validate-app \
            --type osx \
            --file "$PKG_PATH" \
            --username "$APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --asc-public-id "$APPLE_TEAM_ID" \
            --output-format json \
            | tee $RUNNER_TEMP/altool-validate.json

      # ── 9. Upload artifact for manual Transporter submission ───────────────
      - name: Upload .pkg artifact
        if: ${{ github.event.inputs.validate_only != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: MachStruct-${{ github.ref_name }}.pkg
          path: ${{ env.PKG_PATH }}
          retention-days: 14

      - name: Submission instructions
        if: ${{ github.event.inputs.validate_only != 'true' }}
        run: |
          echo "::notice::Validated .pkg uploaded as workflow artifact."
          echo "::notice::Download it and submit via Transporter, or run:"
          echo "::notice::  xcrun altool --upload-app --type osx --file MachStruct.pkg \\"
          echo "::notice::    --username \$APPLE_ID --password \$APP_SPECIFIC_PASSWORD"

      # ── 10. Cleanup ────────────────────────────────────────────────────────
      - name: Remove temporary keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
